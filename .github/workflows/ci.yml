name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Run pycodestyle
        run: |
          pycodestyle --max-line-length=100 .claude/skills/enterprise-qa/tools/*.py
          pycodestyle --max-line-length=100 .claude/skills/enterprise-qa/tests/*.py

      - name: Run tests
        run: |
          pytest .claude/skills/enterprise-qa/tests -v \
            --cov=.claude/skills/enterprise-qa/tools \
            --cov-report=term \
            --cov-report=html \
            --cov-fail-under=80